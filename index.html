<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Tic-Tac-Toe</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./style.css">
        <script src="./main.js"></script>
    </head>
    <body>
        <div class = "titleScreen">
            <div class = "head">TIC-TAC-TOE</div>
            <div class = "subhead">Press Enter or Click the screen to continue</div>
        </div>
        <div class = "playerCreation">
            <div class = "fields">
                <div style="display:flex;justify-content:center;flex-wrap;flex-wrap: wrap;">
                    <!-- <label for "playerOneName">Player Name</label> -->
                    <input type = "text" class="playerOne name" id = "playerOneName" placeholder="Player 1 Name">
                    <select class = "playerOne type" id = "playerOneType">
                        <option value="Human">Human</option>
                        <option value = "AI">AI</option>
                    </select>
                    <select class ="playerOne difficulty" id = "playerOneDifficulty">
                        <option>Easy</option>
                        <option>Normal</option>
                        <option>Hard</option>
                    </select>
                </div>
                <div style="display:flex;justify-content:center;flex-wrap;flex-wrap: wrap;">
                    <!-- <label for "playerTwoName">Player Name</label> -->
                    <input type = "text" class="playerTwo name" id = "playerTwoName" placeholder="Player 2 Name">
                    <select class = "playerTwo type" id = "playerTwoType">
                        <option>Human</option>
                        <option>AI</option>
                    </select>
                    <select class ="playerTwo difficulty" id = "playerTwoDifficulty">
                        <option>Easy</option>
                        <option>Normal</option>
                        <option>Hard</option>
                    </select>
                </div>
            </div>
            <button>Enter</button>
        </div>
        <div class = "container"> 

        </div>
    </body>
</html>
