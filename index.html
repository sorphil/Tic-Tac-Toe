<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Tic-Tac-Toe</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./style.css">
        <script src="./main.js"></script>
    </head>
    <body> 
        
        <div class = "titleScreen" >
            <div class = "head">TIC-TAC-TOE</div>
            <div class = "subhead">Press Enter or Click the screen to continue</div>
        </div>
        <div class = "playerCreation" style="display: none;">
            <div class = "fields">
                <div class = "playerFields" id ="playerOneFields">
                    <div class ="playerIcon">
                        <img src="./HumanIcon.png"  class = "humanIcon" id = "playerOneHumanIcon">
                        <img src="./RobotIcon.png"  class = "robotIcon" id = "playerOneRobotIcon">
                    </div>

                    <input type = "text" class="playerOne name" id = "playerOneName" placeholder="Player 1 Name">
                    <select class = "playerOne type" id = "playerOneType">
                        <option value="Human">Human</option>
                        <option value = "AI">AI</option>
                    </select>
                    <select class ="playerOne difficulty" id = "playerOneDifficulty">
                        <option>Easy</option>
                        <option>Normal</option>
                        <option>Hard</option>
                    </select>
                </div>

                <div class = "playerFields" id ="playerTwoFields">
                    <div class ="playerIcon">
                        <img src="./HumanIcon.png" class = "humanIcon"  id = "playerTwoHumanIcon">
                        <img src="./RobotIcon.png"  class = "robotIcon" id = "playerTwoRobotIcon">
                    </div>
                    <input type = "text" class="playerTwo name" id = "playerTwoName" placeholder="Player 2 Name">
                    <select class = "playerTwo type" id = "playerTwoType">
                        <option>Human</option>
                        <option>AI</option>
                    </select>
                    <select class ="playerTwo difficulty" id = "playerTwoDifficulty">
                        <option>Easy</option>
                        <option>Normal</option>
                        <option>Hard</option>
                    </select>
                </div>
            </div>
            <div class = "enterButton">
                <button>Enter</button>
            </div>

        </div>
        <div class = "gameContainer">
            <div class = "score"></div>
            <div class = "turn"></div>
            <div class = "boardContainer">

            </div>
            <button class = "reset-btn">Reset</button>
            <button class = "back-btn">Back</button>
        </div>

    </body>
</html>
